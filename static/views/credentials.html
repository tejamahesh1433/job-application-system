<div class="pgh">
  <div>
    <div class="pgtit">Platform Credentials</div>
    <div class="pgsub">Login details for job platforms — encrypted at rest, used by the browser agent to apply automatically.</div>
  </div>
  <button class="btn bpri bsm" onclick="seedCredentials()">⚡ Auto-fill from Profile</button>
</div>

<!-- Add / Update Credential form -->
<div class="panel" style="margin-bottom:14px">
  <div class="ph">
    <div class="ptl"><span class="pd"></span><span id="cred-form-label">Add Credential</span></div>
    <div id="cred-msg" style="font-family:var(--mono);font-size:10px;display:none"></div>
  </div>
  <div style="padding:16px 18px">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:12px;align-items:end;margin-bottom:12px">
      <div class="fg" style="margin-bottom:0">
        <label class="fl">Platform</label>
        <select id="cred-platform" class="fsel" style="width:100%">
          <option value="">Select platform…</option>
        </select>
      </div>
      <div class="fg" style="margin-bottom:0">
        <label class="fl">Username / Email</label>
        <input id="cred-username" class="fi" type="email" placeholder="you@email.com" style="width:100%">
      </div>
      <div class="fg" style="margin-bottom:0">
        <label class="fl">Password</label>
        <div style="position:relative">
          <input id="cred-password" class="fi" type="password" placeholder="••••••••" style="width:100%;padding-right:38px">
          <button onclick="togglePwd('cred-password',this)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;background:none;border:none;color:var(--t3);font-size:13px;padding:0;line-height:1;transition:color .15s" onmouseover="this.style.color='var(--t2)'" onmouseout="this.style.color='var(--t3)'">👁</button>
        </div>
      </div>
      <button class="btn bpri" style="height:38px;padding:0 20px;white-space:nowrap;align-self:end" onclick="saveCred()">Save</button>
    </div>
    <div class="fg" style="margin-bottom:0;max-width:500px">
      <label class="fl">Notes <span style="font-weight:400;opacity:.5">(optional)</span></label>
      <input id="cred-notes" class="fi" type="text" placeholder="e.g. 2FA enabled, use phone number">
    </div>
  </div>
</div>

<!-- Credentials list -->
<div class="panel">
  <div class="ph">
    <div class="ptl"><span class="pd ok"></span><span>Saved Credentials</span></div>
  </div>
  <div id="cred-list">
    <div class="empty"><div class="et">Loading…</div></div>
  </div>
</div>

<style>
.ccard{
  display:flex;align-items:center;gap:14px;
  padding:12px 18px;border-bottom:1px solid rgba(28,35,55,.5);
  transition:background .12s;
}
.ccard:last-child{border-bottom:none;}
.ccard:hover{background:var(--card-h);}
.ccard-ico{
  width:30px;height:30px;border-radius:6px;
  background:var(--surf);border:1px solid var(--bord);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:10px;font-weight:700;
  color:var(--t2);flex-shrink:0;text-transform:uppercase;
}
.cplatform{font-size:13px;font-weight:600;color:var(--t1);width:110px;flex-shrink:0;}
.cuser{font-family:var(--mono);font-size:11px;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cpwd{font-family:var(--mono);font-size:12px;color:var(--t3);width:110px;flex-shrink:0;letter-spacing:.04em;}
.cbadge{
  font-family:var(--mono);font-size:8px;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;
  padding:2px 8px;border-radius:3px;flex-shrink:0;
}
.cb-on {background:var(--ok-d); color:var(--ok); border:1px solid rgba(34,197,94,.25);}
.cb-off{background:var(--err-d);color:var(--err);border:1px solid rgba(239,68,68,.2);}
</style>

<script>
(function(){
  const API=window.API||'http://localhost:8000', UID=window.UID||1;
  let editId=null;

  async function load(){
    try{
      const r=await fetch(API+'/api/credentials?user_id='+UID);
      const d=await r.json();
      const sel=document.getElementById('cred-platform');
      sel.innerHTML='<option value="">Select platform…</option>'+(d.platforms||[]).map(p=>`<option value="${p}">${p}</option>`).join('');
      renderList(d.credentials||[]);
    }catch(e){
      document.getElementById('cred-list').innerHTML='<div style="text-align:center;color:var(--err);padding:40px;font-family:var(--mono);font-size:11px">Failed to load: '+e.message+'</div>';
    }
  }

  function renderList(creds){
    const el=document.getElementById('cred-list');
    if(!creds.length){
      el.innerHTML='<div class="empty"><div class="et">No credentials saved yet. Use "Auto-fill from Profile" to add defaults.</div></div>';
      return;
    }
    el.innerHTML=creds.map(c=>`
    <div class="ccard" id="cc-${c.id}">
      <div class="ccard-ico">${(c.platform||'?').charAt(0).toUpperCase()}</div>
      <div class="cplatform">${esc(c.platform)}</div>
      <div class="cuser">${esc(c.username)}</div>
      <div class="cpwd" id="pwd-${c.id}">••••••••</div>
      <span class="cbadge ${c.is_active?'cb-on':'cb-off'}">${c.is_active?'Active':'Inactive'}</span>
      ${c.notes?`<span style="font-family:var(--mono);font-size:9px;color:var(--t3);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(c.notes)}">${esc(c.notes)}</span>`:''}
      <div style="display:flex;gap:6px;margin-left:auto;flex-shrink:0">
        <button class="btn bsec bsm" onclick="revealPwd(${c.id})">Show</button>
        <button class="btn bsec bsm" onclick="editCred(${c.id},'${escJs(c.platform)}','${escJs(c.username)}','${escJs(c.notes)}')">Edit</button>
        <button class="btn bghost bsm" style="color:var(--err)" onclick="deleteCred(${c.id},'${escJs(c.platform)}')">Delete</button>
      </div>
    </div>`).join('');
  }

  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function escJs(s){return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

  function showMsg(text,color){
    const m=document.getElementById('cred-msg');
    m.style.color=color; m.textContent=text; m.style.display='';
  }

  window.togglePwd=function(id,btn){
    const inp=document.getElementById(id);
    if(inp.type==='password'){inp.type='text';btn.textContent='🙈';}
    else{inp.type='password';btn.textContent='👁';}
  };

  window.revealPwd=async function(id){
    const el=document.getElementById('pwd-'+id);
    if(el.textContent!=='••••••••'){el.textContent='••••••••';return;}
    const r=await fetch(API+'/api/credentials/'+id+'?show_password=true&user_id='+UID);
    const d=await r.json();
    el.textContent=d.credential?.password||'error';
    setTimeout(()=>{ if(el) el.textContent='••••••••'; },8000);
  };

  window.editCred=function(id,platform,username,notes){
    editId=id;
    const lbl=document.getElementById('cred-form-label');
    if(lbl) lbl.textContent='Edit Credential';
    document.getElementById('cred-platform').value=platform;
    document.getElementById('cred-username').value=username;
    document.getElementById('cred-password').value='';
    document.getElementById('cred-notes').value=notes;
    document.getElementById('cred-platform').scrollIntoView({behavior:'smooth'});
  };

  window.saveCred=async function(){
    const platform=document.getElementById('cred-platform').value;
    const username=document.getElementById('cred-username').value.trim();
    const password=document.getElementById('cred-password').value;
    const notes=document.getElementById('cred-notes').value.trim();
    if(!platform||!username){showMsg('Platform and username are required.','var(--err)');return;}
    if(!editId&&!password){showMsg('Password is required for new credentials.','var(--err)');return;}
    try{
      const body={platform,username,notes,user_id:UID};
      if(password) body.password=password;
      const method=editId?'PUT':'POST';
      const url=editId?API+'/api/credentials/'+editId:API+'/api/credentials';
      const r=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const d=await r.json();
      if(!r.ok) throw new Error(d.detail||'Error');
      showMsg(editId?'Updated!':'Saved!','var(--ok)');
      editId=null;
      const lbl=document.getElementById('cred-form-label');
      if(lbl) lbl.textContent='Add Credential';
      document.getElementById('cred-platform').value='';
      document.getElementById('cred-username').value='';
      document.getElementById('cred-password').value='';
      document.getElementById('cred-notes').value='';
      setTimeout(()=>{ document.getElementById('cred-msg').style.display='none'; },3000);
      load();
    }catch(e){showMsg(e.message,'var(--err)');}
  };

  window.deleteCred=async function(id,platform){
    if(!confirm('Delete '+platform+' credentials?')) return;
    await fetch(API+'/api/credentials/'+id+'?user_id='+UID,{method:'DELETE'});
    load();
  };

  window.seedCredentials=async function(){
    const r=await fetch(API+'/api/credentials/seed-from-profile?user_id='+UID,{method:'POST'});
    const d=await r.json();
    alert(d.message||'Done');
    load();
  };

  window.loadCredentialsTab = load;
  load();
})();
</script>
