<div class="pgh">
  <div>
    <div class="pgtit">Form History</div>
    <div class="pgsub">Every form the automation filled — what was asked and what was answered, saved per company.</div>
  </div>
  <input id="fr-search" type="text" class="finp" placeholder="Search company…"
    oninput="filterForms()" style="width:220px">
</div>

<!-- Stats bar -->
<div id="fr-stats" style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap"></div>

<!-- Company accordion list -->
<div id="fr-list" style="display:flex;flex-direction:column;gap:10px">
  <div class="empty"><div class="et">Loading form history…</div></div>
</div>

<style>
.fr-company{background:var(--card);border:1px solid var(--bord);border-radius:var(--r);overflow:hidden;}
.fr-company-hd{
  padding:12px 18px;display:flex;align-items:center;gap:12px;
  cursor:pointer;user-select:none;transition:background .12s;
}
.fr-company-hd:hover{background:var(--card-h);}
.fr-company-name{font-size:13px;font-weight:600;color:var(--t1);flex:1;}
.fr-company-ico{
  width:28px;height:28px;border-radius:6px;
  background:var(--surf);border:1px solid var(--bord);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:10px;font-weight:700;
  color:var(--t2);flex-shrink:0;text-transform:uppercase;
}

.fr-record{border-top:1px solid var(--bord);padding:14px 18px;}
.fr-record-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.fr-job{font-size:13px;font-weight:600;color:var(--t1);}
.fr-meta{font-family:var(--mono);font-size:9px;color:var(--t3);}

.fr-status{
  font-family:var(--mono);font-size:8px;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;
  padding:2px 7px;border-radius:3px;
}
.frs-filled   {background:var(--info-d); color:var(--info); border:1px solid rgba(96,165,250,.2);}
.frs-submitted{background:var(--ok-d);   color:var(--ok);   border:1px solid rgba(34,197,94,.2);}
.frs-error    {background:var(--err-d);  color:var(--err);  border:1px solid rgba(239,68,68,.2);}

.fr-fields-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;margin-top:10px;}
.fr-field{
  background:var(--surf);border:1px solid var(--bord);
  border-radius:var(--rs);padding:8px 12px;
}
.fr-field-section{
  font-family:var(--mono);font-size:8px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;color:var(--acc);
  margin-bottom:3px;
}
.fr-field-label{font-family:var(--mono);font-size:9px;color:var(--t3);margin-bottom:4px;}
.fr-field-value{font-size:12px;color:var(--t1);word-break:break-word;line-height:1.4;}

.fr-chevron{
  width:16px;height:16px;color:var(--t3);flex-shrink:0;
  transition:transform .2s;
}
.fr-chevron.open{transform:rotate(90deg);}
</style>

<script>
(function(){
  const API=window.API||'http://localhost:8000', UID=window.UID||1;
  let allByCompany={};

  async function load(){
    try{
      const r=await fetch(API+'/api/form-records?user_id='+UID+'&limit=200');
      const d=await r.json();
      allByCompany=d.by_company||{};
      renderStats(d.total||0, Object.keys(allByCompany).length);
      renderList(allByCompany);
      const badge=document.getElementById('form-cnt');
      if(badge&&d.total>0){badge.textContent=d.total;badge.style.display='';}
    }catch(e){
      document.getElementById('fr-list').innerHTML=
        '<div style="color:var(--err);padding:40px;text-align:center;font-family:var(--mono);font-size:11px">Could not load form history: '+e.message+'</div>';
    }
  }

  function renderStats(total, companies){
    document.getElementById('fr-stats').innerHTML=[
      statCard('Total Forms Filled', total, 'var(--t1)'),
      statCard('Companies Applied To', companies, 'var(--acc)'),
    ].join('');
  }

  function statCard(label, value, color){
    return `<div style="background:var(--card);border:1px solid var(--bord);border-radius:var(--r);padding:14px 20px;min-width:160px">
      <div style="font-family:var(--serif);font-size:36px;font-weight:700;color:${color};line-height:1;margin-bottom:6px">${value}</div>
      <div style="font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3)">${label}</div>
    </div>`;
  }

  function renderList(byCompany){
    const q=(document.getElementById('fr-search')||{}).value||'';
    const el=document.getElementById('fr-list');
    const companies=Object.keys(byCompany).filter(c=>!q||c.toLowerCase().includes(q.toLowerCase()));
    if(!companies.length){
      el.innerHTML='<div class="empty"><div class="et">No form records found yet. Forms are recorded automatically when the agent applies to jobs.</div></div>';
      return;
    }
    el.innerHTML=companies.map(company=>{
      const records=byCompany[company]||[];
      const recHtml=records.map(r=>recordHtml(r)).join('');
      const safe=esc(company);
      return `
      <div class="fr-company" id="frc-${safe}">
        <div class="fr-company-hd" onclick="toggleCompany('${safe}')">
          <svg class="fr-chevron" id="toggle-${safe}" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4l4 4-4 4"/></svg>
          <div class="fr-company-ico">${company.charAt(0).toUpperCase()}</div>
          <span class="fr-company-name">${safe}</span>
          <span style="font-family:var(--mono);font-size:9px;color:var(--t3)">${records.length} form${records.length!==1?'s':''}</span>
          <span style="font-family:var(--mono);font-size:9px;color:var(--t3)">${(records[0]?.filled_at||'').slice(0,10)}</span>
        </div>
        <div class="fr-body" id="frb-${safe}" style="display:none">${recHtml}</div>
      </div>`;
    }).join('');
  }

  function recordHtml(r){
    const sc = r.status==='submitted'?'frs-submitted':r.status==='error'?'frs-error':'frs-filled';
    const fields=(r.fields||[]).map(f=>`
      <div class="fr-field">
        ${f.section?`<div class="fr-field-section">${esc(f.section)}</div>`:''}
        <div class="fr-field-label">${esc(f.label||f.question||'')}</div>
        <div class="fr-field-value">${esc(f.value||'—')}</div>
      </div>`).join('');
    return `
    <div class="fr-record">
      <div class="fr-record-hd">
        <span class="fr-job">${esc(r.job_title||'Unknown Role')}</span>
        <span class="fr-status ${sc}">${esc(r.status)}</span>
        ${r.platform?`<span class="fr-meta">via ${esc(r.platform)}</span>`:''}
        <span class="fr-meta">${(r.filled_at||'').slice(0,16).replace('T',' ')}</span>
        <span class="fr-meta">${r.filled_fields}/${r.total_fields} fields filled</span>
        ${r.form_url?`<a href="${esc(r.form_url)}" target="_blank" style="font-family:var(--mono);font-size:9px;color:var(--acc);text-decoration:none" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">View form ↗</a>`:''}
      </div>
      ${r.error_message?`<div style="font-family:var(--mono);font-size:11px;color:var(--err);margin-bottom:8px;padding:6px 10px;background:var(--err-d);border:1px solid rgba(239,68,68,.15);border-radius:var(--rs)">Error: ${esc(r.error_message)}</div>`:''}
      <div class="fr-fields-grid">${fields||'<div style="font-family:var(--mono);font-size:10px;color:var(--t3)">No field data recorded.</div>'}</div>
    </div>`;
  }

  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

  window.toggleCompany=function(company){
    const body=document.getElementById('frb-'+company);
    const tog=document.getElementById('toggle-'+company);
    if(!body) return;
    const open=body.style.display!=='none';
    body.style.display=open?'none':'block';
    if(tog) tog.classList.toggle('open',!open);
  };

  window.filterForms=function(){renderList(allByCompany);};

  window.loadFormRecordsTab = load;
  load();
})();
</script>
